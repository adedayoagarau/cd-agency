name: Content Audit

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  content-audit:
    name: Audit UI strings
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cd-agency
        run: pip install -e ".[dev]"

      - name: Get changed files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }} -- \
            '*.js' '*.jsx' '*.ts' '*.tsx' '*.vue' '*.html' | tr '\n' ' ')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract hardcoded UI strings
        if: steps.changed.outputs.has_files == 'true'
        id: extract
        run: |
          python ci/extract_strings.py . \
            --changed-files ${{ steps.changed.outputs.files }} \
            --max-strings 200 > extracted_strings.json
          COUNT=$(python -c "import json; d=json.load(open('extracted_strings.json')); print(d['total_found'])")
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"

      - name: Run content audit agents
        if: steps.changed.outputs.has_files == 'true' && steps.extract.outputs.count != '0'
        continue-on-error: true
        id: audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python ci/run_audit.py \
            --input extracted_strings.json \
            --output audit_report.md

      - name: Generate fallback report
        if: steps.changed.outputs.has_files != 'true' || steps.extract.outputs.count == '0' || steps.audit.outcome == 'failure'
        run: |
          if [ "${{ steps.audit.outcome }}" = "failure" ]; then
            printf '## Content Audit Report\n\nThe content audit agents encountered an error. Check the workflow logs for details.\n' > audit_report.md
          else
            printf '## Content Audit Report\n\nNo hardcoded UI strings were found in the changed files. Nothing to review.\n' > audit_report.md
          fi

      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('audit_report.md', 'utf8');
            const marker = '<!-- cd-agency-content-audit -->';
            const fullBody = `${marker}\n${body}`;

            // Find existing comment to update instead of creating duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
