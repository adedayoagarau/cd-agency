version: "3.8"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/__pycache__
      - cd-agency-data:/root/.cd-agency
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v2/health')"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./packages/dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./packages/dashboard:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
    command: npm run dev
    depends_on:
      api:
        condition: service_healthy

volumes:
  cd-agency-data:
